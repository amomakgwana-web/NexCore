worker_processes 1;
error_log /home/user/NexCore/gateway/logs/error.log warn;
pid /home/user/NexCore/gateway/logs/nginx.pid;

events { worker_connections 512; }

http {
  access_log /home/user/NexCore/gateway/logs/access.log;
  sendfile on;

upstream auth-service {
    least_conn;
    server 127.0.0.1:4001 max_fails=2 fail_timeout=10s;
    server 127.0.0.1:4002 max_fails=2 fail_timeout=10s;
}

upstream payroll-service {
    least_conn;
    server 127.0.0.1:4011 max_fails=2 fail_timeout=10s;
    server 127.0.0.1:4012 max_fails=2 fail_timeout=10s;
}

upstream billing-service {
    least_conn;
    server 127.0.0.1:4021 max_fails=2 fail_timeout=10s;
    server 127.0.0.1:4022 max_fails=2 fail_timeout=10s;
}

