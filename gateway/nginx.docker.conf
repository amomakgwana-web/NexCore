        proxy_connect_timeout 2s;
    }

    location /api/accounting/ {
        rewrite ^/api/accounting/(.*)$ /$1 break;
        proxy_pass http://accounting-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/finance/ {
        rewrite ^/api/finance/(.*)$ /$1 break;
        proxy_pass http://finance-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/hr/ {
        rewrite ^/api/hr/(.*)$ /$1 break;
        proxy_pass http://hr-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/crm/ {
        rewrite ^/api/crm/(.*)$ /$1 break;
        proxy_pass http://crm-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/procurement/ {
        rewrite ^/api/procurement/(.*)$ /$1 break;
        proxy_pass http://procurement-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/approvals/ {
        rewrite ^/api/approvals/(.*)$ /$1 break;
        proxy_pass http://approvals-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/claims/ {
        rewrite ^/api/claims/(.*)$ /$1 break;
