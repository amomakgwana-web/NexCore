worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 512; }

http {
  access_log /dev/stdout;
  sendfile on;

upstream auth-service {
    least_conn;
    server auth-service-1:4000 max_fails=2 fail_timeout=10s;
    server auth-service-2:4000 max_fails=2 fail_timeout=10s;
}

upstream payroll-service {
    least_conn;
    server payroll-service-1:4000 max_fails=2 fail_timeout=10s;
    server payroll-service-2:4000 max_fails=2 fail_timeout=10s;
}

upstream billing-service {
    least_conn;
    server billing-service-1:4000 max_fails=2 fail_timeout=10s;
    server billing-service-2:4000 max_fails=2 fail_timeout=10s;
}

