upstream payments-service {
    least_conn;
    server payments-service-1:4000 max_fails=2 fail_timeout=10s;
    server payments-service-2:4000 max_fails=2 fail_timeout=10s;
}

upstream state-service {
    least_conn;
    server state-service-1:4000 max_fails=2 fail_timeout=10s;
    server state-service-2:4000 max_fails=2 fail_timeout=10s;
}

  server {
    listen 0.0.0.0:8080;

    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://auth-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/payroll/ {
        rewrite ^/api/payroll/(.*)$ /$1 break;
        proxy_pass http://payroll-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/billing/ {
        rewrite ^/api/billing/(.*)$ /$1 break;
        proxy_pass http://billing-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
