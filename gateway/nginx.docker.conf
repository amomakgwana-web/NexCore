        proxy_connect_timeout 2s;
    }

    location /api/contracts/ {
        rewrite ^/api/contracts/(.*)$ /$1 break;
        proxy_pass http://contracts-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/projects/ {
        rewrite ^/api/projects/(.*)$ /$1 break;
        proxy_pass http://projects-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/notifications/ {
        rewrite ^/api/notifications/(.*)$ /$1 break;
        proxy_pass http://notifications-service;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
    }

    location /api/audit/ {
        rewrite ^/api/audit/(.*)$ /$1 break;
        proxy_pass http://audit-service;
